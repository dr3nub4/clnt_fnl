<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ODM Data Warehouse Architecture</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#07111f;color:#e2e8f0;font-family:'IBM Plex Sans',sans-serif;overflow:hidden;}

#topbar{
  position:fixed;top:0;left:0;right:0;height:50px;z-index:200;
  background:rgba(7,17,31,0.98);border-bottom:1px solid #162236;
  display:flex;align-items:center;gap:12px;padding:0 16px;
}
#topbar h1{font-size:13px;font-weight:700;color:#f1f5f9;white-space:nowrap;}
#topbar h1 em{color:#60a5fa;font-style:normal;}
.sep{width:1px;height:22px;background:#162236;flex-shrink:0;}
#search{
  background:#0d1e33;border:1px solid #162236;color:#e2e8f0;
  padding:5px 11px;border-radius:5px;font-size:11px;font-family:'IBM Plex Mono',monospace;
  width:180px;outline:none;
}
#search:focus{border-color:#3b82f6;}
#search::placeholder{color:#2d4a6b;}
.lbtn{
  padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;
  border:1px solid;cursor:pointer;transition:all 0.15s;white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;background:transparent;flex-shrink:0;
}
.lbtn[data-l="BASE"]{border-color:#3b82f6;color:#3b82f6;}
.lbtn[data-l="GL_AD"]{border-color:#10b981;color:#10b981;}
.lbtn[data-l="GL_AF"]{border-color:#f59e0b;color:#f59e0b;}
.lbtn[data-l="GL_AG"]{border-color:#ef4444;color:#ef4444;}
.lbtn[data-l="GL_BR"]{border-color:#a855f7;color:#a855f7;}
.lbtn.off{opacity:0.25;}
.zoom-ctrl{display:flex;gap:4px;margin-left:auto;}
.zbtn{
  width:28px;height:28px;background:#0d1e33;border:1px solid #162236;
  color:#94a3b8;border-radius:4px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.zbtn:hover{background:#162236;color:#fff;}

#viewport{
  position:fixed;top:50px;left:0;right:280px;bottom:0;
  overflow:hidden;cursor:grab;background:#07111f;
  transition:right 0.25s;
}
#viewport.panel-open{right:420px;}
#viewport.panning{cursor:grabbing;}
#world{position:absolute;top:0;left:0;transform-origin:0 0;}

.lane{position:absolute;left:0;border-top:1px solid;}
.lane-label{position:absolute;left:8px;top:8px;font-size:11px;font-weight:700;letter-spacing:0.1em;font-family:'IBM Plex Mono',monospace;}
.lane-desc{position:absolute;left:8px;top:25px;font-size:8px;font-family:'IBM Plex Mono',monospace;opacity:0.4;max-width:88px;line-height:1.3;}

.card{
  position:absolute;width:155px;height:58px;
  background:#0c1c30;border:1px solid #1a2f4a;border-radius:5px;
  padding:7px 9px 6px;cursor:pointer;
  transition:border-color 0.12s,opacity 0.15s,box-shadow 0.12s;overflow:hidden;
}
.card:hover{border-color:var(--c)!important;box-shadow:0 0 0 1px var(--c),0 4px 16px rgba(0,0,0,0.5);z-index:10;}
.card.sel{border-color:var(--c)!important;box-shadow:0 0 0 2px var(--c),0 6px 20px rgba(0,0,0,0.6);z-index:20;background:#0f2240;}
.card.conn{border-color:var(--c)!important;opacity:1;z-index:5;background:#0e1f35;}
.card.dim{opacity:0.06;pointer-events:none;}
.cname{font-size:9.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--c);line-height:1.25;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cfields{font-size:8px;color:#2d4a6b;margin-top:3px;font-family:'IBM Plex Mono',monospace;}
.cbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--c);opacity:0.35;}

svg#csvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* PANEL */
#panel{
  position:fixed;top:50px;right:0;bottom:0;width:420px;
  background:#081523;border-left:1px solid #162236;
  transform:translateX(100%);transition:transform 0.22s ease;
  z-index:150;display:flex;flex-direction:column;
}
#panel.open{transform:translateX(0);}

#panel-header{
  padding:16px 16px 12px;border-bottom:1px solid #0f2030;flex-shrink:0;
}
#panel-header h2{font-size:14px;font-weight:700;word-break:break-all;line-height:1.4;margin-bottom:4px;}
.ptag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:8px;}
.pmeta{display:flex;gap:16px;font-size:10px;font-family:'IBM Plex Mono',monospace;}
.pmeta span{color:#334155;}.pmeta b{color:#64748b;}

#panel-tabs{
  display:flex;border-bottom:1px solid #0f2030;flex-shrink:0;
}
.ptab{
  flex:1;padding:8px;font-size:10px;font-weight:600;text-align:center;
  cursor:pointer;color:#334155;border-bottom:2px solid transparent;
  transition:all 0.15s;font-family:'IBM Plex Mono',monospace;
  text-transform:uppercase;letter-spacing:0.08em;
}
.ptab.active{color:#60a5fa;border-color:#60a5fa;}
.ptab:hover:not(.active){color:#64748b;}

#panel-body{flex:1;overflow-y:auto;padding:0;}
#panel-body::-webkit-scrollbar{width:4px;}
#panel-body::-webkit-scrollbar-track{background:#07111f;}
#panel-body::-webkit-scrollbar-thumb{background:#162236;border-radius:2px;}

/* Relationship item */
.rel-group{border-bottom:1px solid #0a1828;}
.rel-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px 8px;cursor:pointer;
  transition:background 0.1s;
}
.rel-header:hover{background:#0a1828;}
.rel-tname{
  font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rel-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;flex-shrink:0;}
.rel-count{font-size:9px;color:#334155;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.rel-arrow{font-size:10px;color:#1e3a5f;transition:transform 0.15s;flex-shrink:0;}
.rel-arrow.open{transform:rotate(90deg);}
.rel-fields{display:none;padding:0 14px 10px 14px;}
.rel-fields.open{display:block;}
.field-chip{
  display:inline-block;font-size:9px;font-family:'IBM Plex Mono',monospace;
  padding:2px 7px;border-radius:3px;border:1px solid #162236;
  color:#475569;background:#0a1626;margin:2px 3px 2px 0;
  cursor:pointer;transition:all 0.1s;
}
.field-chip:hover{color:#93c5fd;border-color:#1d3a5f;}
.field-chip.key{color:#fbbf24;border-color:#2d2000;background:#1a1000;}
.field-chip.rid{color:#a78bfa;border-color:#1e1040;background:#100a2a;}

.go-btn{
  font-size:9px;font-family:'IBM Plex Mono',monospace;
  padding:2px 8px;border-radius:3px;border:1px solid #162236;
  color:#60a5fa;background:#0a1828;cursor:pointer;
  transition:all 0.1s;flex-shrink:0;
}
.go-btn:hover{background:#0f2240;border-color:#3b82f6;}

#pclosebtn{position:absolute;top:12px;right:12px;background:none;border:none;color:#1e3a5f;font-size:18px;cursor:pointer;z-index:1;}
#pclosebtn:hover{color:#64748b;}

/* Summary tab */
.sum-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-bottom:1px solid #0a1828;font-size:10px;
}
.sum-key{color:#334155;font-family:'IBM Plex Mono',monospace;}
.sum-val{color:#64748b;font-family:'IBM Plex Mono',monospace;text-align:right;}

/* Tooltip */
#tt{
  position:fixed;background:#0d1e33;border:1px solid #162236;
  border-radius:5px;padding:8px 10px;font-size:10px;pointer-events:none;
  opacity:0;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,0.7);
  font-family:'IBM Plex Mono',monospace;transition:opacity 0.08s;
}
#tt.show{opacity:1;}

#legend{
  position:fixed;bottom:12px;left:12px;z-index:100;
  background:rgba(9,24,42,0.97);border:1px solid #162236;
  border-radius:6px;padding:10px 12px;font-size:10px;
}
#legend h4{font-size:8px;text-transform:uppercase;letter-spacing:0.12em;color:#1e3a5f;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.leg{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legname{color:#64748b;font-size:10px;min-width:44px;font-family:'IBM Plex Mono',monospace;}
.legdesc{color:#1e3a5f;font-size:9px;}

.empty-state{padding:30px 14px;text-align:center;color:#1e3a5f;font-size:11px;}
</style>
</head>

<div id="topbar">
  <h1>ODM <em>Data Warehouse</em> — Architecture</h1>
  <div class="sep"></div>

</div>

<div id="tt"></div>

<div id="legend">

const WORLD_W   = 2080;
const WORLD_H   = 2206;
const COLS      = 12;
const CARD_W    = 155;
const CARD_H    = 58;

const LAYER_ORDER = ['GL_AG','GL_AF','GL_AD','BASE','GL_BR'];
const LCFG = {
  GL_AG:{color:'#ef4444',desc:'Aggregate Layer — monthly/quarterly rollups'},
  GL_AF:{color:'#f59e0b',desc:'Fact Layer — financial events & measures'},
  GL_AD:{color:'#10b981',desc:'Dimension Layer — enriched entity snapshots'},
  BASE: {color:'#3b82f6',desc:'Data Vault Core — Hubs, Links, Satellites'},
  GL_BR:{color:'#a855f7',desc:'Bridge Layer — many-to-many relationships'},
};

const world  = document.getElementById('world');
const vp     = document.getElementById('viewport');
const csvg   = document.getElementById('csvg');
const panel  = document.getElementById('panel');

// Build lanes
LAYER_ORDER.forEach(layer => {
  const cfg = LCFG[layer];
  const y = LANE_Y[layer], h = LANE_H[layer];
  const el = document.createElement('div');
  el.className='lane'; el.dataset.layer=layer;
  el.style.cssText=`top:${y}px;height:${h}px;width:${WORLD_W}px;background:${cfg.color}08;border-color:${cfg.color}22;`;
  el.innerHTML=`<div class="lane-label" style="color:${cfg.color}">${layer}</div><div class="lane-desc" style="color:${cfg.color}">${cfg.desc}</div>`;
  world.appendChild(el);
});

// Build cards
const cardEls={};
LAYER_ORDER.forEach(layer=>{
  const cfg=LCFG[layer];
  (LAYOUT.groups[layer]||[]).forEach(tname=>{
    const p=POS[tname]; if(!p) return;
    const el=document.createElement('div');
    el.className='card'; el.dataset.table=tname; el.dataset.layer=layer;
    el.style.cssText=`left:${p.lx}px;top:${p.ly}px;--c:${cfg.color};`;
    el.innerHTML=`<div class="cname">${tname}</div><div class="cfields">${LAYOUT.fieldCounts[tname]||0} fields</div><div class="cbar"></div>`;
    el.addEventListener('mouseenter',ev=>showTip(tname,ev));
    el.addEventListener('mouseleave',hideTip);
    el.addEventListener('click',ev=>{ev.stopPropagation();selectTable(tname);});
    world.appendChild(el);
    cardEls[tname]=el;
  });
});
world.style.width=WORLD_W+'px';
world.style.height=WORLD_H+'px';

// Pan & Zoom
let cx=0,cy=0,cz=1,panning=false,psx,psy,pcx,pcy;
function applyT(){world.style.transform=`translate(${cx}px,${cy}px) scale(${cz})`;}

vp.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  panning=true;psx=e.clientX;psy=e.clientY;pcx=cx;pcy=cy;vp.classList.add('panning');
});
window.addEventListener('mousemove',e=>{if(!panning)return;cx=pcx+e.clientX-psx;cy=pcy+e.clientY-psy;applyT();});
window.addEventListener('mouseup',()=>{panning=false;vp.classList.remove('panning');});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  const mx=e.clientX,my=e.clientY-50;
  cx=mx-(mx-cx)*f; cy=my-(my-cy)*f;
  cz=Math.max(0.05,Math.min(4,cz*f));
  applyT();
},{passive:false});

function fitAll(){
  const vpW=vp.clientWidth,vpH=vp.clientHeight;
  const s=Math.min(vpW/WORLD_W,vpH/WORLD_H)*0.94;
  cz=s; cx=(vpW-WORLD_W*s)/2; cy=(vpH-WORLD_H*s)/2; applyT();
}
setTimeout(fitAll,30);
document.getElementById('zfit').onclick=fitAll;
document.getElementById('zin').onclick=()=>{cz=Math.min(4,cz*1.25);applyT();};
document.getElementById('zout').onclick=()=>{cz=Math.max(0.05,cz*0.8);applyT();};

// SVG connections
function clearSvg(){while(csvg.firstChild)csvg.removeChild(csvg.firstChild);}
function makeLine(x1,y1,x2,y2,stroke,sw){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',sw);
  csvg.appendChild(l);
}

function drawConns(tname){
  clearSvg();
  if(!tname) return;
  const rels=FIELD_RELS[tname]||{};
  const a=POS[tname]; if(!a) return;
  Object.keys(rels).forEach(other=>{
    const b=POS[other]; if(!b) return;
    const layer=TABLE_LAYER[other];
    const color=layer?LCFG[layer]?.color:'#64748b';
    makeLine(a.x,a.y,b.x,b.y,color+'99',1.5);
  });
  // highlight selected node on top
}

// Selection & Panel
let selTable=null;
let activeTab='rels';

function selectTable(tname){
  selTable=tname;
  const layer=TABLE_LAYER[tname];
  const cfg=LCFG[layer]||{color:'#64748b'};
  const rels=FIELD_RELS[tname]||{};
  const connSet=new Set(Object.keys(rels));

  Object.entries(cardEls).forEach(([n,el])=>{
    el.classList.remove('sel','conn','dim');
    if(n===tname) el.classList.add('sel');
    else if(connSet.has(n)) el.classList.add('conn');
    else el.classList.add('dim');
  });

  drawConns(tname);

  // Header
  document.getElementById('pname').textContent=tname;
  const ptag=document.getElementById('ptag');
  ptag.textContent=layer; ptag.style.background=cfg.color+'22'; ptag.style.color=cfg.color;
  document.getElementById('pfields').textContent=LAYOUT.fieldCounts[tname]||0;
  document.getElementById('player').textContent=layer;
  document.getElementById('pbase').textContent=LAYOUT.layerToBase[tname]||(layer==='BASE'?tname:'—');
  document.getElementById('prelcount').textContent=Object.keys(rels).length;

  buildRelsTab(tname, rels);
  buildSummaryTab(tname, layer, rels);
  switchTab(activeTab);

  panel.classList.add('open');
  vp.classList.add('panel-open');
}

function buildRelsTab(tname, rels){
  const container=document.getElementById('tab-rels');
  if(Object.keys(rels).length===0){
    container.innerHTML='<div class="empty-state">No field-level relationships found</div>';
    return;
  }

  // Group by layer
  const byLayer={};
  Object.entries(rels).forEach(([other,fields])=>{
    const l=TABLE_LAYER[other]||'OTHER';
    if(!byLayer[l]) byLayer[l]=[];
    byLayer[l].push({table:other,fields});
  });

  let html='';
  LAYER_ORDER.forEach(layer=>{
    if(!byLayer[layer]) return;
    const lcolor=LCFG[layer]?.color||'#64748b';
    const items=byLayer[layer].sort((a,b)=>b.fields.length-a.fields.length);
    items.forEach(item=>{
      const fieldChips=item.fields.map(f=>{
        const cls=f.endsWith('_UID')||f.endsWith('_BK')||f.endsWith('_ID')?'key':f.endsWith('_RID')||f.endsWith('_SID')?'rid':'';
        return `<span class="field-chip ${cls}" title="${f}">${f}</span>`;
      }).join('');
      html+=`
      <div class="rel-group">
        <div class="rel-header" onclick="toggleRel(this)">
          <div class="rel-tname" style="color:${lcolor}">${item.table}</div>
          <div class="rel-tag" style="background:${lcolor}22;color:${lcolor}">${layer}</div>
          <div class="rel-count">${item.fields.length} field${item.fields.length!==1?'s':''}</div>
          <button class="go-btn" onclick="event.stopPropagation();jumpTo('${item.table}')">→ go</button>
          <div class="rel-arrow">›</div>
        </div>
        <div class="rel-fields">${fieldChips}</div>
      </div>`;
    });
  });
  container.innerHTML=html;
}

function buildSummaryTab(tname, layer, rels){
  const relCount=Object.keys(rels).length;
  const layerCounts={};
  Object.keys(rels).forEach(other=>{
    const l=TABLE_LAYER[other]||'OTHER';
    layerCounts[l]=(layerCounts[l]||0)+1;
  });

  let rows=`
    <div class="sum-row"><span class="sum-key">Table</span><span class="sum-val">${tname}</span></div>
    <div class="sum-row"><span class="sum-key">Layer</span><span class="sum-val">${layer}</span></div>
    <div class="sum-row"><span class="sum-key">Fields</span><span class="sum-val">${LAYOUT.fieldCounts[tname]||0}</span></div>
    <div class="sum-row"><span class="sum-key">Base entity</span><span class="sum-val">${LAYOUT.layerToBase[tname]||(layer==='BASE'?tname:'—')}</span></div>
    <div class="sum-row"><span class="sum-key">Total relationships</span><span class="sum-val">${relCount}</span></div>`;
  
  LAYER_ORDER.forEach(l=>{
    if(layerCounts[l]) rows+=`<div class="sum-row"><span class="sum-key">→ ${l}</span><span class="sum-val">${layerCounts[l]} tables</span></div>`;
  });
  document.getElementById('tab-summary').innerHTML=rows;
}

window.toggleRel=function(header){
  const fields=header.nextElementSibling;
  const arrow=header.querySelector('.rel-arrow');
  const open=fields.classList.toggle('open');
  arrow.classList.toggle('open',open);
};

// Tabs
document.querySelectorAll('.ptab').forEach(tab=>{
  tab.addEventListener('click',function(){
    switchTab(this.dataset.tab);
  });
});
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('tab-rels').style.display=tab==='rels'?'block':'none';
  document.getElementById('tab-summary').style.display=tab==='summary'?'block':'none';
}

function clearSel(){
  selTable=null;
  Object.values(cardEls).forEach(el=>el.classList.remove('sel','conn','dim'));
  clearSvg();
  panel.classList.remove('open');
  vp.classList.remove('panel-open');
}

vp.addEventListener('click',e=>{
  if(!e.target.closest('.card')) clearSel();
});
document.getElementById('pclosebtn').onclick=clearSel;

window.jumpTo=function(tname){
  const p=POS[tname]; if(!p) return;
  const vpW=vp.clientWidth,vpH=vp.clientHeight;
  cz=1.6; cx=vpW/2-p.x*cz; cy=vpH/2-p.y*cz; applyT();
  selectTable(tname);
};

// Tooltip
const tt=document.getElementById('tt');
function showTip(tname,e){
  const layer=TABLE_LAYER[tname];
  const c=LCFG[layer]?.color||'#64748b';
  const rc=Object.keys(FIELD_RELS[tname]||{}).length;
  tt.innerHTML=`<span style="color:${c};font-weight:600">${tname}</span><br><span style="color:#334155">${LAYOUT.fieldCounts[tname]||0} fields · ${rc} relationships</span>`;
  tt.className='show';
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-220)+'px';
  tt.style.top=Math.min(e.clientY-10,window.innerHeight-60)+'px';
}
function hideTip(){tt.className='';}

// Search
document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){clearSel();return;}
  const matches=new Set(Object.keys(cardEls).filter(n=>n.toLowerCase().includes(q)));
  Object.entries(cardEls).forEach(([n,el])=>{
    el.classList.remove('sel','conn','dim');
    if(!matches.has(n)) el.classList.add('dim');
  });
  clearSvg();
  if(matches.size===1) jumpTo([...matches][0]);
});

// Layer toggles
document.querySelectorAll('.lbtn[data-l]').forEach(btn=>{
  btn.addEventListener('click',function(){
    this.classList.toggle('off');
    const hidden=this.classList.contains('off');
    const layer=this.dataset.l;
    Object.entries(cardEls).forEach(([n,el])=>{
      if(el.dataset.layer===layer) el.style.visibility=hidden?'hidden':'visible';
    });
    document.querySelector(`.lane[data-layer="${layer}"]`).style.opacity=hidden?0.15:1;
  });
});
</script>
